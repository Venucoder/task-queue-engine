version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: task_queue_db
      POSTGRES_USER: task_queue_user
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker-1:
    build: .
    command: python manage.py run_worker --worker-id=worker-1
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy

  worker-2:
    build: .
    command: python manage.py run_worker --worker-id=worker-2
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy

  reaper:
    build: .
    command: python manage.py run_reaper
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:

